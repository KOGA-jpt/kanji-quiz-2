<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語彙カードと読みクイズ（デジタル教科書）</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--sub:#6b7280;--accent:#2563eb;--border:#dbe3f0;--soft:#f8fbff;--ok:#15803d;--ng:#b91c1c}
    *{box-sizing:border-box} body{margin:0;font-family:"Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .wrap{max-width:960px;margin:0 auto;padding:20px}.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.06);padding:22px;margin-bottom:18px}
    h1,h2{margin-top:0}.sub{color:var(--sub);font-size:.98rem}.tabs,.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button,input,select{font:inherit}.tabBtn,button{border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700}.tabBtn.active,.primary{background:var(--accent);color:#fff}.tabBtn:not(.active),.secondary{background:#e5ecf8;color:#1e3a8a}.ghost{background:#eef2f7;color:#334155}
    .panel{display:block}.hidden{display:none !important}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.vocabGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}@media(max-width:700px){.grid,.vocabGrid{grid-template-columns:1fr}.question{font-size:2rem}}
    label{display:block;font-weight:700;margin-bottom:6px} input,select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:#fff}
    .vocabItem{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#fff}.vocabHeader{width:100%;text-align:left;background:var(--soft);color:var(--text);border-radius:0;padding:16px;display:flex;justify-content:space-between;align-items:center;font-size:1.1rem}.vocabHeader span:last-child{color:var(--sub);font-size:.95rem}
    .vocabBody{display:none;padding:16px;border-top:1px solid var(--border)}.vocabItem.open .vocabBody{display:block}.meaningBlock{margin-bottom:10px}.meaningLabel{font-weight:700;color:#1e3a8a;margin-bottom:2px}
    .meta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;color:var(--sub);font-size:.95rem}.questionBox{text-align:center;padding:16px 10px;background:#f8fbff;border:1px solid #dceaff;border-radius:18px;margin:18px 0}.questionLabel{color:var(--sub);font-size:.95rem;margin-bottom:8px}.question{font-size:2.5rem;font-weight:800;letter-spacing:.06em}
    .feedback{margin-top:14px;padding:14px;border-radius:14px;font-weight:700;display:none}.ok{background:#ecfdf3;color:var(--ok);border:1px solid #bbf7d0;display:block}.ng{background:#fef2f2;color:var(--ng);border:1px solid #fecaca;display:block}.score{font-size:1.2rem;font-weight:800;margin:6px 0 10px}.resultList{padding-left:1.2em}.muted{color:var(--sub);font-size:.92rem}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>語彙カードと読みクイズ（デジタル教科書）</h1>
    <div class="sub">語彙をタップすると、読み方と意味が開きます。上のボタンで語彙カードと読みクイズを切り替えられます。</div>
    <div class="tabs">
      <button class="tabBtn active" data-target="vocabPanel">語彙を見る</button>
      <button class="tabBtn" data-target="quizPanel">読みクイズをする</button>
    </div>
  </div>

  <div class="panel" id="vocabPanel">
    <div class="card">
      <h2>語彙カード</h2>
      <div class="sub">単語をタップすると、読み・やさしい日本語・中国語・ベトナム語・ネパール語・シンハラ語・英語が表示されます。</div>
      <label for="searchInput">語彙検索</label>
      <input id="searchInput" type="text" placeholder="漢字・読み・意味で検索" />
      <div class="controls">
        <button class="secondary" id="openAllBtn">全部ひらく</button>
        <button class="ghost" id="closeAllBtn">全部とじる</button>
      </div>
      <div class="vocabGrid" id="vocabGrid"></div>
    </div>
  </div>

  <div class="panel hidden" id="quizPanel">
    <div class="card">
      <h2>読みクイズ</h2>
      <div class="grid">
        <div><label for="studentId">学籍番号</label><input id="studentId" type="text" placeholder="例：20260001" /></div>
        <div><label for="studentName">名前</label><input id="studentName" type="text" placeholder="例：すずき はなこ" /></div>
      </div>
      <div class="grid" style="margin-top:12px;">
        <div><label for="questionCount">問題数</label><select id="questionCount"><option value="10">10問</option><option value="20">20問</option><option value="50">50問</option></select></div>
        <div><label for="mode">出題方法</label><select id="mode"><option value="random">ランダム</option><option value="fixed">1番から順番</option></select></div>
      </div>
      <div class="controls"><button class="primary" id="startBtn">はじめる</button></div>
    </div>

    <div class="card hidden" id="quizCard">
      <div class="meta"><div id="studentInfo">学籍番号：　／　名前：</div><div id="progress">第1問</div></div>
      <div class="questionBox"><div class="questionLabel">次のことばの読みを、ひらがなで答えましょう。</div><div class="question" id="questionText">文部科学省</div></div>
      <label for="answerInput">こたえ</label>
      <div class="feedback" id="feedback"></div>
      <input id="answerInput" type="text" placeholder="ひらがなで入力" autocomplete="off" />
      <div class="muted">※ ひらがなで入力してください。</div>
      <div class="controls"><button class="primary" id="checkBtn">答え合わせ</button><button class="secondary" id="hintBtn">ヒント</button><button class="secondary" id="showAnswerBtn">答えを見る</button><button class="secondary hidden" id="nextBtn">次の問題へ</button><button class="ghost" id="restartBtn">最初に戻る</button></div>
      </div>

    <div class="card hidden" id="resultCard">
      <h2>結果</h2>
      <div id="resultStudent"></div>
      <div class="score" id="scoreText"></div>
      <div class="muted">まちがえた問題は下で確認できます。</div>
      <ol class="resultList" id="mistakeList"></ol>
      <div class="controls"><button class="primary" id="retryWrongBtn">まちがえた問題だけもう一度</button><button class="secondary" id="newQuizBtn">新しくやり直す</button></div>
    </div>
  </div>
</div>

{kanji:"学校教育法改正案",reading:"がっこうきょういくほうかいせいあん",jp:"学校教育法を変えるための案。",zh:"学校教育法修正案",vi:"dự thảo sửa đổi Luật Giáo dục Trường học",ne:"विद्यालय शिक्षा ऐन संशोधन प्रस्ताव",si:"පාසල් අධ්‍යාපන නීති සංශෝධන කෙටුම්පත",en:"bill to amend the School Education Act"},

{kanji:"ハイブリッド",reading:"はいぶりっど",jp:"二つ以上を組み合わせた形。",zh:"混合型，混合",vi:"lai, kết hợp",ne:"मिश्रित रूप",si:"මිශ්‍ර ආකාරය",en:"hybrid"},
{kanji:"順次",reading:"じゅんじ",jp:"順番に少しずつ進めること。",zh:"依次，陆续",vi:"lần lượt, theo thứ tự",ne:"क्रमशः",si:"क्रमයෙන්",en:"sequentially; gradually"}
];

const tabBtns=document.querySelectorAll('.tabBtn'); const panels=document.querySelectorAll('.panel');
tabBtns.forEach(btn=>btn.addEventListener('click',()=>{tabBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');panels.forEach(p=>p.classList.add('hidden'));const target=document.getElementById(btn.dataset.target);target.classList.remove('hidden');target.scrollIntoView({behavior:'smooth',block:'start'});}));

const vocabGrid=document.getElementById('vocabGrid');
function renderVocab(list){vocabGrid.innerHTML=''; list.forEach((w,i)=>{const div=document.createElement('div'); div.className='vocabItem'; div.innerHTML=`<button class="vocabHeader" type="button"><span>${i+1}. ${w.kanji}</span><span>タップでひらく</span></button><div class="vocabBody"><div class="meaningBlock"><div class="meaningLabel">読み</div><div>${w.reading}</div></div><div class="meaningBlock"><div class="meaningLabel">やさしい日本語</div><div>${w.jp}</div></div><div class="meaningBlock"><div class="meaningLabel">中国語</div><div>${w.zh}</div></div><div class="meaningBlock"><div class="meaningLabel">ベトナム語</div><div>${w.vi}</div></div><div class="meaningBlock"><div class="meaningLabel">ネパール語</div><div>${w.ne}</div></div><div class="meaningBlock"><div class="meaningLabel">シンハラ語</div><div>${w.si}</div></div><div class="meaningBlock"><div class="meaningLabel">英語</div><div>${w.en}</div></div></div>`; div.querySelector('.vocabHeader').addEventListener('click',()=>div.classList.toggle('open')); vocabGrid.appendChild(div);});}
renderVocab(WORDS);
document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase(); const filtered=WORDS.filter(w=>Object.values(w).some(v=>String(v).toLowerCase().includes(q))); renderVocab(filtered);});
document.getElementById('openAllBtn').addEventListener('click',()=>document.querySelectorAll('.vocabItem').forEach(x=>x.classList.add('open')));
document.getElementById('closeAllBtn').addEventListener('click',()=>document.querySelectorAll('.vocabItem').forEach(x=>x.classList.remove('open')));

const startBtn=document.getElementById('startBtn'),quizCard=document.getElementById('quizCard'),resultCard=document.getElementById('resultCard'),questionText=document.getElementById('questionText'),progress=document.getElementById('progress'),answerInput=document.getElementById('answerInput'),checkBtn=document.getElementById('checkBtn'),hintBtn=document.getElementById('hintBtn'),showAnswerBtn=document.getElementById('showAnswerBtn'),nextBtn=document.getElementById('nextBtn'),restartBtn=document.getElementById('restartBtn'),feedback=document.getElementById('feedback'),studentInfo=document.getElementById('studentInfo'),resultStudent=document.getElementById('resultStudent'),scoreText=document.getElementById('scoreText'),mistakeList=document.getElementById('mistakeList'),retryWrongBtn=document.getElementById('retryWrongBtn'),newQuizBtn=document.getElementById('newQuizBtn');
let quizItems=[],currentIndex=0,score=0,checked=false,mistakes=[],hintUsed=false,answerShown=false;
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function normalize(t){return (t||'').trim().replace(/\s+/g,'')}
function buildQuiz(items){quizItems=items;currentIndex=0;score=0;checked=false;mistakes=[];hintUsed=false;answerShown=false;resultCard.classList.add('hidden');quizCard.classList.remove('hidden');renderQuestion();answerInput.focus()}
function startQuizFromSettings(){const sid=document.getElementById('studentId').value.trim(),sname=document.getElementById('studentName').value.trim(),count=Number(document.getElementById('questionCount').value),mode=document.getElementById('mode').value;studentInfo.textContent=`学籍番号：${sid||'未入力'}　／　名前：${sname||'未入力'}`;resultStudent.textContent=studentInfo.textContent;let items=mode==='random'?shuffle(WORDS):[...WORDS];buildQuiz(items.slice(0,count))}
function renderQuestion(){const item=quizItems[currentIndex];questionText.textContent=item.kanji;progress.textContent=`第${currentIndex+1}問 / ${quizItems.length}`;answerInput.value='';checked=false;hintUsed=false;answerShown=false;feedback.className='feedback';feedback.textContent='';nextBtn.classList.add('hidden');checkBtn.disabled=false;hintBtn.disabled=false;showAnswerBtn.disabled=false}
function checkAnswer(){if(checked)return;const item=quizItems[currentIndex],user=normalize(answerInput.value),correct=normalize(item.reading);if(!user){feedback.className='feedback ng';feedback.textContent='こたえを入力するか、「ヒント」「答えを見る」を使ってください。';feedback.scrollIntoView({behavior:'smooth',block:'center'});return}checked=true;checkBtn.disabled=true;hintBtn.disabled=true;showAnswerBtn.disabled=true;nextBtn.classList.remove('hidden');if(user===correct){score++;feedback.className='feedback ok';feedback.textContent=hintUsed?`〇 正解です！ヒントを使って、「${item.kanji}」を「${item.reading}」と読めました。`:`〇 正解です！「${item.kanji}」は「${item.reading}」です。`;feedback.scrollIntoView({behavior:'smooth',block:'center'})}else{mistakes.push(item);feedback.className='feedback ng';feedback.textContent=`× ちがいます。正解は「${item.reading}」です。`;feedback.scrollIntoView({behavior:'smooth',block:'center'})}}
function showHint(){if(checked)return;const item=quizItems[currentIndex];hintUsed=true;const first=item.reading.charAt(0);const masked=first+'＿'.repeat(Math.max(item.reading.length-1,1));feedback.className='feedback ok';feedback.textContent=`ヒント：${masked}（${item.reading.length}文字）`;feedback.scrollIntoView({behavior:'smooth',block:'center'});answerInput.focus()}
function showAnswer(){if(checked)return;const item=quizItems[currentIndex];answerShown=true;checked=true;checkBtn.disabled=true;hintBtn.disabled=true;showAnswerBtn.disabled=true;nextBtn.classList.remove('hidden');mistakes.push(item);feedback.className='feedback ng';feedback.textContent=`答え：${item.reading}`;feedback.scrollIntoView({behavior:'smooth',block:'center'});answerInput.value=item.reading}
function nextQuestion(){if(!checked)return;currentIndex++;if(currentIndex>=quizItems.length){showResults();return}renderQuestion();answerInput.focus()}
function showResults(){quizCard.classList.add('hidden');resultCard.classList.remove('hidden');scoreText.textContent=`${quizItems.length}問中 ${score}問正解`;mistakeList.innerHTML='';if(mistakes.length===0){const li=document.createElement('li');li.textContent='全問正解です。すばらしいです。';mistakeList.appendChild(li);retryWrongBtn.disabled=true}else{retryWrongBtn.disabled=false;mistakes.forEach(item=>{const li=document.createElement('li');li.textContent=`${item.kanji} → ${item.reading}`;mistakeList.appendChild(li)})}}
startBtn.addEventListener('click',startQuizFromSettings);checkBtn.addEventListener('click',checkAnswer);hintBtn.addEventListener('click',showHint);showAnswerBtn.addEventListener('click',showAnswer);nextBtn.addEventListener('click',nextQuestion);restartBtn.addEventListener('click',()=>{quizCard.classList.add('hidden');resultCard.classList.add('hidden');window.scrollTo({top:0,behavior:'smooth'})});retryWrongBtn.addEventListener('click',()=>{if(mistakes.length>0)buildQuiz(shuffle(mistakes))});newQuizBtn.addEventListener('click',()=>{resultCard.classList.add('hidden');window.scrollTo({top:0,behavior:'smooth'})});answerInput.addEventListener('keydown',e=>{if(e.key==='Enter'){if(!checked)checkAnswer();else nextQuestion();}});
</script>
</body>
</html>
